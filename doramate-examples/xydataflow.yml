__doramate__:
  layout:
    recorder:
      x: 680.0
      y: 260.0
      label: recorder
    webcam:
      x: 120.0
      y: 120.0
      label: webcam
    object_detection:
      x: 400.0
      y: 120.0
      label: object_detection
    viewer:
      x: 680.0
      y: 120.0
      label: viewer
  name: My Dataflow
nodes:
- id: webcam
  path: target/release/webcam
  inputs:
    tick: dora/timer/millis/100
  outputs:
  - frame
  env:
    PATH: C:\vcpkg\installed\x64-windows\bin;${PATH}
- id: object_detection
  path: target/release/object_detection
  inputs:
    frame: webcam/frame
  outputs:
  - detections
  env:
    PATH: C:\vcpkg\installed\x64-windows\bin;${PATH}
- id: viewer
  path: target/release/viewer
  inputs:
    detections: object_detection/detections
    frame: webcam/frame
  env:
    PATH: C:\vcpkg\installed\x64-windows\bin;${PATH}
- id: recorder
  path: target/release/recorder
  inputs:
    detections: object_detection/detections
    frame: webcam/frame
  env:
    RECORDER_FPS: '30'
    PATH: C:\vcpkg\installed\x64-windows\bin;${PATH}
    RECORDER_OUTPUT: recording.avi
