nodes:
  - id: webcam
    build: cargo build -p webcam --release
    path: target/release/webcam
    env:
      PATH: "C:\\vcpkg\\installed\\x64-windows\\bin;${PATH}"
    inputs:
      tick: dora/timer/millis/100
    outputs:
      - frame

  - id: object_detection
    build: cargo build -p object_detection --release
    path: target/release/object_detection
    env:
      PATH: "C:\\vcpkg\\installed\\x64-windows\\bin;${PATH}"
    inputs:
      frame: webcam/frame
    outputs:
      - detections

  - id: viewer
    build: cargo build -p viewer --release
    path: target/release/viewer
    env:
      PATH: "C:\\vcpkg\\installed\\x64-windows\\bin;${PATH}"
    inputs:
      detections: object_detection/detections
      frame: webcam/frame

  - id: recorder
    build: cargo build -p recorder --release
    path: target/release/recorder
    env:
      PATH: "C:\\vcpkg\\installed\\x64-windows\\bin;${PATH}"
      RECORDER_OUTPUT: "recording.avi"
      RECORDER_FPS: "30"
    inputs:
      detections: object_detection/detections
      frame: webcam/frame
